# start with `docker compose up`
services:
  free-games-claimer:
    container_name: fgc # is printed in front of every output line
    image: ghcr.io/vogler/free-games-claimer # otherwise image name will be free-games-claimer-free-games-claimer
    build: .
    healthcheck: # see Dockerfile, check that node is running and noVNC is reachable
      test: pgrep node && curl --fail http://localhost:6080 || exit 1
      interval: 5s
      timeout: 5s
    ports:
      # - "5900:5900" # VNC server
      - "6080:6080" # noVNC (browser-based VNC client)
      - "7080:7080" # interactive login panel (LOGIN_MODE=1)
    volumes:
      - fgc:/fgc/data
    # command: bash -c "node epic-games; node gog; node steam"
    environment:
      # - EMAIL=foo@bar.org
      # - NOTIFY='tgram://...'
      # - LOGIN_MODE=1 # launch interactive login panel on port 7080 instead of automated claiming
      # - LOOP=28800 # repeat claiming every N seconds (e.g., 28800 = 8 hours); omit to run once and exit
      # - STEAM_MIN_RATING=6 # minimum review rating 1-9 (6 = Mostly Positive)
      # - STEAM_MIN_PRICE=10 # minimum original price in USD
